<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Syrink · Assistent</title>
<style>
:root{
  --bg:#14161d;--panel:#1b1e29;--p2:#222636;--line:#2b3042;
  --text:#eaecf2;--muted:#8a91a6;--gold:#ffb23e;--green:#34d399;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:radial-gradient(900px 420px at 85% -8%,rgba(255,178,62,.10),transparent 60%),var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;height:100dvh;
}
.head{
  display:flex;align-items:center;gap:11px;
  padding:14px 18px;border-bottom:1px solid var(--line);
  flex:none;background:rgba(20,22,29,.85);
}
.sun{width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle at 50% 45%,#ffd27a,var(--gold) 62%,#e0851a);
  box-shadow:0 0 16px rgba(255,178,62,.35);flex:none}
.htext h1{font-size:15px;letter-spacing:.14em;margin:0}
.htext .sub{font-size:9px;letter-spacing:.30em;color:var(--muted);text-transform:uppercase;margin-top:2px}
.live{margin-left:auto;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}

.chat{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:9px;max-width:90%}
.row.u{align-self:flex-end;flex-direction:row-reverse}
.av{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px}
.av.a{background:radial-gradient(circle at 50% 45%,#ffd27a,var(--gold) 62%,#e0851a)}
.av.u{background:var(--p2);border:1px solid var(--line)}
.bub{padding:11px 14px;border-radius:15px;font-size:14.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
.row.a .bub{background:var(--panel);border:1px solid var(--line);border-top-left-radius:5px}
.row.u .bub{background:linear-gradient(180deg,#ffc25e,var(--gold));color:#1a1206;border-top-right-radius:5px;font-weight:500}
.bub a{color:var(--gold)}
.typing{display:flex;gap:4px;padding:4px 2px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bl 1.2s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

.sugg{display:flex;flex-wrap:wrap;gap:8px;padding:2px 16px 10px}
.chip{background:var(--p2);color:var(--text);border:1px solid var(--line);border-radius:18px;padding:8px 13px;font-size:12.5px;font-family:inherit;cursor:pointer}
.chip:active{opacity:.6}

.foot{flex:none;padding:10px 14px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(20,22,29,.85)}
.inwrap{display:flex;gap:9px;align-items:flex-end}
textarea#msg{flex:1;background:var(--p2);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:15px;font-family:inherit;resize:none;max-height:120px;line-height:1.4}
textarea#msg:focus{outline:none;border-color:var(--gold)}
.send{flex:none;width:46px;height:46px;border-radius:14px;border:none;background:var(--gold);color:#1a1206;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.send:disabled{opacity:.4;cursor:default}
.hint{font-size:10px;color:#5d647a;text-align:center;margin-top:7px}
.errbox{margin:14px 16px;padding:12px;border:1px solid #ffcf66;border-radius:10px;background:#2a2410;color:#ffe9b0;font:12px/1.5 system-ui;white-space:pre-wrap}
</style>
</head>
<body>
  <!-- Fehler-Melder: zeigt jeden JS-Fehler direkt auf der Seite an -->
  <script>
  window.onerror=function(msg,src,line,col){
    try{
      var host=document.getElementById('chat')||document.body;
      var d=document.createElement('div');
      d.className='errbox';
      d.textContent='⚠ Anzeige-Fehler:\n'+msg+'\n(Zeile '+line+':'+col+')';
      host.appendChild(d);
    }catch(e){}
    return false;
  };
  </script>

  <div class="head">
    <div class="sun"></div>
    <div class="htext"><h1>SYRINK</h1><div class="sub">Assistent</div></div>
    <div class="live"><span class="dot"></span><span>Live</span></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="sugg" id="sugg">
    <button class="chip">Was ist heute offen?</button>
    <button class="chip">Welche Deals muss ich nachfassen?</button>
    <button class="chip">Todos von meiner Frau?</button>
    <button class="chip">Fasse die Kundennotizen zusammen</button>
  </div>

  <div class="foot">
    <div class="inwrap">
      <textarea id="msg" rows="1" placeholder="Frag mich etwas über dein Geschäft…"></textarea>
      <button class="send" id="send">➤</button>
    </div>
    <div class="hint">Antworten basieren auf dem letzten Snapshot · vertraulich, Link privat halten</div>
  </div>

<script>
/* ====== EINZIGE EINSTELLUNG: deine Make-Chat-Adresse ====== */
var WEBHOOK = "https://hook.eu2.make.com/ye7bnoryos1ks71oh9l4knyjf0da36qm";
/* ========================================================== */

var chat = document.getElementById('chat');
var input = document.getElementById('msg');
var sendBtn = document.getElementById('send');
var sugg = document.getElementById('sugg');
var convo = [];
var busy = false;

function esc(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function linkify(t){return esc(t).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}

function bubble(role, text){
  var row=document.createElement('div');
  row.className='row '+(role==='u'?'u':'a');
  var av=document.createElement('div');
  av.className='av '+(role==='u'?'u':'a');
  av.textContent=(role==='u')?'🧑':'';
  var b=document.createElement('div');
  b.className='bub';
  b.innerHTML=linkify(text);
  row.appendChild(av); row.appendChild(b);
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
}

function typing(){
  var row=document.createElement('div');
  row.className='row a'; row.id='typing';
  row.innerHTML='<div class="av a"></div><div class="bub"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(row); chat.scrollTop=chat.scrollHeight;
}
function stopTyping(){ var t=document.getElementById('typing'); if(t){ t.parentNode.removeChild(t); } }

function transcript(){
  var out=[];
  for(var i=Math.max(0,convo.length-8); i<convo.length; i++){
    out.push((convo[i].r==='u'?'Ilias':'Assistent')+': '+convo[i].t);
  }
  return out.join('\n');
}

function send(text){
  text=(text||'').replace(/^\s+|\s+$/g,'');
  if(!text || busy) return;
  busy=true; sendBtn.disabled=true;
  if(sugg){ sugg.style.display='none'; }
  bubble('u', text);
  var hist=transcript();
  convo.push({r:'u', t:text});
  input.value=''; autoGrow();
  typing();

  var xhr=new XMLHttpRequest();
  xhr.open('POST', WEBHOOK, true);
  xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded;charset=UTF-8');
  xhr.timeout=60000;
  xhr.onload=function(){
    stopTyping();
    var reply=(xhr.responseText||'').replace(/^\s+|\s+$/g,'');
    if(!reply) reply='(Keine Antwort erhalten – bitte nochmal versuchen.)';
    bubble('a', reply);
    convo.push({r:'a', t:reply});
    busy=false; sendBtn.disabled=false; input.focus();
  };
  xhr.onerror=function(){
    stopTyping();
    bubble('a','⚠️ Verbindung zu Make fehlgeschlagen. Bist du online? Gleich nochmal versuchen.');
    busy=false; sendBtn.disabled=false;
  };
  xhr.ontimeout=function(){
    stopTyping();
    bubble('a','⚠️ Zeitüberschreitung – der Assistent hat zu lange gebraucht. Nochmal versuchen.');
    busy=false; sendBtn.disabled=false;
  };
  xhr.send('msg='+encodeURIComponent(text)+'&hist='+encodeURIComponent(hist));
}

function autoGrow(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,120)+'px'; }

input.addEventListener('input', autoGrow);
input.addEventListener('keydown', function(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(input.value); }
});
sendBtn.addEventListener('click', function(){ send(input.value); });
sugg.addEventListener('click', function(e){
  if(e.target && e.target.className && e.target.className.indexOf('chip')!==-1){ send(e.target.textContent); }
});

/* Start – immer Begrüßung, keine Alt-Daten */
bubble('a','Hallo Ilias 👋 Ich bin dein Syrink-Assistent. Ich kenne deine offenen Anfragen, HubSpot-Deals, Erinnerungen und Kundennotizen. Frag einfach – oder tippe unten einen der grauen Knöpfe an.');
</script>
</body>
</html>
